<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>🐴 小马快跑</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #2C5F8A;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100%;
            max-height: 800px;
            overflow: hidden;
            background: #87CEEB;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #start-screen, #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        #start-screen.hidden, #game-over-screen.hidden {
            display: none;
        }

        .panel {
            background: linear-gradient(180deg, #FFF8DC 0%, #FFE4B5 100%);
            border-radius: 25px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3), inset 0 2px 10px rgba(255,255,255,0.8);
            border: 4px solid #FFD700;
            max-width: 85%;
            animation: popIn 0.5s ease;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        h1 {
            font-size: 2.5rem;
            color: #FF6B6B;
            margin-bottom: 15px;
            text-shadow: 2px 2px 0 #FFB6C1;
            -webkit-text-stroke: 1px #FF1493;
        }

        h2 {
            font-size: 2rem;
            color: #FF6B6B;
            margin-bottom: 15px;
            text-shadow: 2px 2px 0 #FFB6C1;
        }

        .subtitle {
            font-size: 1rem;
            color: #8B7355;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .score-box {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border-radius: 15px;
            padding: 15px 30px;
            margin: 15px 0;
            box-shadow: 0 4px 15px rgba(255, 165, 0, 0.4);
        }

        .score-box .label {
            font-size: 1rem;
            color: #8B4513;
            font-weight: bold;
        }

        .score-box .value {
            font-size: 2.5rem;
            color: #FFF;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .high-score-box {
            font-size: 1rem;
            color: #8B7355;
            margin: 15px 0;
            padding: 8px 20px;
            background: rgba(255,255,255,0.6);
            border-radius: 20px;
            border: 2px dashed #DEB887;
        }

        button {
            padding: 15px 40px;
            font-size: 1.3rem;
            font-weight: bold;
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.15s;
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.5);
            margin-top: 15px;
            -webkit-appearance: none;
        }

        button:active {
            transform: scale(0.92);
        }

        #score-board {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px 18px;
            border-radius: 20px;
            z-index: 5;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        #coin-board {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            background: rgba(255, 215, 0, 0.7);
            padding: 10px 18px;
            border-radius: 20px;
            z-index: 5;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .mobile-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.85rem;
            color: rgba(255,255,255,0.9);
            background: rgba(0,0,0,0.3);
            padding: 8px 18px;
            border-radius: 15px;
            z-index: 5;
            pointer-events: none;
            line-height: 1.5;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div id="score-board">
            🏆 得分: <span id="score">0</span>
        </div>
        
        <div id="coin-board">
            💰 金币: <span id="coins">0</span>
        </div>

        <div class="mobile-hint" id="hint">⬆️ 点击跳跃 | ⬇️ 向下滑动下蹲</div>

        <div id="start-screen">
            <div class="panel">
                <h1>🐴 小马快跑</h1>
                <p class="subtitle">空格/↑ 跳跃 | ↓/向下滑动 下蹲<br>收集金币获得额外分数！</p>
                <button id="start-btn">🎮 开始游戏</button>
                <div class="high-score-box">🌟 最高分: <span id="high-score">0</span></div>
            </div>
        </div>

        <div id="game-over-screen" class="hidden">
            <div class="panel">
                <h2>💔 游戏结束</h2>
                <div class="score-box">
                    <div class="label">最终得分</div>
                    <div class="value" id="final-score">0</div>
                </div>
                <div class="high-score-box">🌟 最高分: <span id="new-high-score">0</span></div>
                <button id="restart-btn">🔄 再玩一次</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const coinsElement = document.getElementById('coins');
        const finalScoreElement = document.getElementById('final-score');
        const highScoreElement = document.getElementById('high-score');
        const newHighScoreElement = document.getElementById('new-high-score');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const hint = document.getElementById('hint');

        let gameState = 'start';
        let score = 0;
        let coins = 0;
        let highScore = parseInt(localStorage.getItem('ponyRunHighScore')) || 0;
        highScoreElement.textContent = highScore;
        newHighScoreElement.textContent = highScore;

        const GRAVITY = 0.6;
        const JUMP_FORCE = -14;
        const GAME_SPEED_INITIAL = 6;
        let gameSpeed = GAME_SPEED_INITIAL;
        let frameCount = 0;

        const pony = {
            x: 80,
            y: 0,
            width: 60,
            height: 60,
            normalHeight: 60,
            crouchHeight: 35,
            velocityY: 0,
            isJumping: false,
            isCrouching: false
        };

        const ground = { y: 0, height: 90 };
        let obstacles = [];
        let coinsList = [];
        let clouds = [];
        let particles = [];
        let mountains = [];
        let trees = [];

        // Touch handling for swipe
        let touchStartY = 0;
        let touchStartTime = 0;

        function resizeCanvas() {
            const container = document.getElementById('game-container');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            ground.y = canvas.height - ground.height;
            pony.y = ground.y - pony.height;
        }

        function drawSky() {
            const gradient = ctx.createLinearGradient(0, 0, 0, ground.y);
            gradient.addColorStop(0, '#4FC3F7');
            gradient.addColorStop(0.5, '#81D4FA');
            gradient.addColorStop(1, '#B3E5FC');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, ground.y);
        }

        function drawSun() {
            const sunX = canvas.width * 0.8;
            const sunY = canvas.height * 0.12;
            const sunSize = 35;
            
            ctx.save();
            ctx.shadowColor = '#FFD700';
            ctx.shadowBlur = 30;
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(sunX, sunY, sunSize, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            
            ctx.fillStyle = '#FFF176';
            ctx.beginPath();
            ctx.arc(sunX - 8, sunY - 5, sunSize * 0.5, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }

        function drawMountains() {
            mountains = mountains.filter(m => m.x > -200);
            
            if (mountains.length === 0 || mountains[mountains.length - 1].x < canvas.width - 150) {
                mountains.push({
                    x: canvas.width + Math.random() * 100,
                    y: ground.y,
                    width: 120 + Math.random() * 80,
                    height: 80 + Math.random() * 60,
                    color: ['#90A4AE', '#78909C', '#607D8B'][Math.floor(Math.random() * 3)]
                });
            }
            
            mountains.forEach(m => {
                m.x -= gameSpeed * 0.2;
                ctx.fillStyle = m.color;
                ctx.beginPath();
                ctx.moveTo(m.x, m.y);
                ctx.lineTo(m.x + m.width / 2, m.y - m.height);
                ctx.lineTo(m.x + m.width, m.y);
                ctx.closePath();
                ctx.fill();
                
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.beginPath();
                ctx.moveTo(m.x + m.width * 0.35, m.y - m.height * 0.6);
                ctx.lineTo(m.x + m.width / 2, m.y - m.height);
                ctx.lineTo(m.x + m.width * 0.5, m.y - m.height * 0.55);
                ctx.closePath();
                ctx.fill();
            });
        }

        function drawClouds() {
            clouds = clouds.filter(c => c.x > -150);
            
            if (clouds.length < 5 && Math.random() < 0.02) {
                clouds.push({
                    x: canvas.width + 50,
                    y: 30 + Math.random() * 80,
                    size: 25 + Math.random() * 20,
                    speed: 0.5 + Math.random() * 0.5
                });
            }
            
            clouds.forEach(c => {
                c.x -= c.speed;
                ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
                ctx.beginPath();
                ctx.arc(c.x, c.y, c.size, 0, Math.PI * 2);
                ctx.arc(c.x + c.size * 0.8, c.y - c.size * 0.2, c.size * 0.7, 0, Math.PI * 2);
                ctx.arc(c.x + c.size * 1.5, c.y, c.size * 0.6, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function drawGround() {
            const grassGradient = ctx.createLinearGradient(0, ground.y, 0, ground.y + 25);
            grassGradient.addColorStop(0, '#66BB6A');
            grassGradient.addColorStop(1, '#43A047');
            ctx.fillStyle = grassGradient;
            ctx.fillRect(0, ground.y, canvas.width, 25);
            
            const dirtGradient = ctx.createLinearGradient(0, ground.y + 25, 0, canvas.height);
            dirtGradient.addColorStop(0, '#795548');
            dirtGradient.addColorStop(1, '#5D4037');
            ctx.fillStyle = dirtGradient;
            ctx.fillRect(0, ground.y + 25, canvas.width, canvas.height - ground.y - 25);
            
            ctx.fillStyle = '#388E3C';
            for (let i = 0; i < canvas.width; i += 20) {
                const offset = (frameCount * 0.5 + i) % 30;
                ctx.beginPath();
                ctx.moveTo(offset, ground.y);
                ctx.lineTo(offset + 4, ground.y - 10);
                ctx.lineTo(offset + 8, ground.y);
                ctx.fill();
            }
        }

        function drawTrees() {
            trees = trees.filter(t => t.x > -60);
            
            if (Math.random() < 0.015) {
                trees.push({
                    x: canvas.width + 20,
                    y: ground.y - 5,
                    type: Math.random() > 0.5 ? 'pine' : 'round'
                });
            }
            
            trees.forEach(t => {
                t.x -= gameSpeed * 0.5;
                
                if (t.type === 'pine') {
                    ctx.fillStyle = '#5D4037';
                    ctx.fillRect(t.x + 8, t.y - 30, 10, 30);
                    
                    ctx.fillStyle = '#2E7D32';
                    ctx.beginPath();
                    ctx.moveTo(t.x, t.y - 20);
                    ctx.lineTo(t.x + 13, t.y - 55);
                    ctx.lineTo(t.x + 26, t.y - 20);
                    ctx.fill();
                    
                    ctx.fillStyle = '#388E3C';
                    ctx.beginPath();
                    ctx.moveTo(t.x + 2, t.y - 35);
                    ctx.lineTo(t.x + 13, t.y - 65);
                    ctx.lineTo(t.x + 24, t.y - 35);
                    ctx.fill();
                } else {
                    ctx.fillStyle = '#5D4037';
                    ctx.fillRect(t.x + 10, t.y - 25, 8, 25);
                    
                    ctx.fillStyle = '#43A047';
                    ctx.beginPath();
                    ctx.arc(t.x + 14, t.y - 35, 18, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = '#66BB6A';
                    ctx.beginPath();
                    ctx.arc(t.x + 14, t.y - 42, 12, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        function drawPony() {
            ctx.save();
            const cx = pony.x + pony.width / 2;
            let cy = pony.y + pony.height / 2;
            
            if (pony.isJumping && pony.velocityY > 0) {
                ctx.translate(cx, cy);
                ctx.rotate(Math.min(0.2, pony.velocityY * 0.02));
                ctx.translate(-cx, -cy);
            }
            
            const runCycle = Math.sin(frameCount * 0.3) * 5;
            
            if (pony.isCrouching) {
                // Crouching pony
                cy = pony.y + pony.height / 2;
                
                // Body - flattened
                ctx.fillStyle = '#FF8A80';
                ctx.beginPath();
                ctx.ellipse(cx, cy, 30, 14, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#FFAB91';
                ctx.beginPath();
                ctx.ellipse(cx - 5, cy - 2, 22, 10, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Head - lowered
                ctx.fillStyle = '#FF8A80';
                ctx.beginPath();
                ctx.ellipse(cx + 20, cy + 2, 14, 12, 0.2, 0, Math.PI * 2);
                ctx.fill();
                
                // Eye
                ctx.fillStyle = '#FFF';
                ctx.beginPath();
                ctx.arc(cx + 24, cy, 5, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#333';
                ctx.beginPath();
                ctx.arc(cx + 26, cy, 2.5, 0, Math.PI * 2);
                ctx.fill();
                
                // Nose
                ctx.fillStyle = '#FFCDD2';
                ctx.beginPath();
                ctx.ellipse(cx + 30, cy + 5, 3, 2, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Mane
                ctx.fillStyle = '#FF7043';
                ctx.beginPath();
                ctx.moveTo(cx + 8, cy - 8);
                ctx.lineTo(cx + 5, cy - 20);
                ctx.lineTo(cx + 16, cy - 10);
                ctx.fill();
                
                // Tail
                ctx.fillStyle = '#FF7043';
                ctx.beginPath();
                ctx.moveTo(cx - 28, cy);
                ctx.quadraticCurveTo(cx - 38, cy - 3, cx - 35, cy + 8);
                ctx.quadraticCurveTo(cx - 30, cy + 5, cx - 26, cy + 3);
                ctx.fill();
                
                // Legs - bent
                ctx.fillStyle = '#D84315';
                ctx.fillRect(cx - 18, cy + 8, 7, 12);
                ctx.fillRect(cx - 5, cy + 8, 7, 12);
                ctx.fillRect(cx + 5, cy + 8, 7, 12);
                ctx.fillRect(cx + 18, cy + 8, 7, 12);
                
                // Hooves
                ctx.fillStyle = '#5D4037';
                ctx.beginPath();
                ctx.ellipse(cx - 14.5, cy + 20, 4, 3, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(cx - 1.5, cy + 20, 4, 3, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(cx + 8.5, cy + 20, 4, 3, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(cx + 21.5, cy + 20, 4, 3, 0, 0, Math.PI * 2);
                ctx.fill();
            } else {
                // Normal standing/running pony
                // Body
                ctx.fillStyle = '#FF8A80';
                ctx.beginPath();
                ctx.ellipse(cx, cy, 28, 22, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#FFAB91';
                ctx.beginPath();
                ctx.ellipse(cx - 5, cy - 3, 20, 16, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Head
                ctx.fillStyle = '#FF8A80';
                ctx.beginPath();
                ctx.ellipse(cx + 22, cy - 12, 16, 14, 0.2, 0, Math.PI * 2);
                ctx.fill();
                
                // Eye
                ctx.fillStyle = '#FFF';
                ctx.beginPath();
                ctx.arc(cx + 26, cy - 16, 6, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#333';
                ctx.beginPath();
                ctx.arc(cx + 28, cy - 16, 3.5, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#FFF';
                ctx.beginPath();
                ctx.arc(cx + 29, cy - 17, 1.5, 0, Math.PI * 2);
                ctx.fill();
                
                // Nose
                ctx.fillStyle = '#FFCDD2';
                ctx.beginPath();
                ctx.ellipse(cx + 34, cy - 10, 4, 3, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Mane
                ctx.fillStyle = '#FF7043';
                ctx.beginPath();
                ctx.moveTo(cx + 10, cy - 20);
                ctx.lineTo(cx + 5, cy - 38);
                ctx.lineTo(cx + 18, cy - 24);
                ctx.fill();
                
                ctx.beginPath();
                ctx.moveTo(cx + 14, cy - 22);
                ctx.lineTo(cx + 12, cy - 40);
                ctx.lineTo(cx + 22, cy - 26);
                ctx.fill();
                
                // Tail
                ctx.fillStyle = '#FF7043';
                ctx.beginPath();
                ctx.moveTo(cx - 26, cy);
                ctx.quadraticCurveTo(cx - 40, cy - 5, cx - 38, cy + 15);
                ctx.quadraticCurveTo(cx - 30, cy + 8, cx - 24, cy + 5);
                ctx.fill();
                
                // Legs
                ctx.fillStyle = '#D84315';
                const legW = 7;
                const legH = 18;
                
                if (!pony.isJumping) {
                    ctx.fillRect(cx - 18, cy + 15 + runCycle, legW, legH);
                    ctx.fillRect(cx - 5, cy + 15 - runCycle, legW, legH);
                    ctx.fillRect(cx + 5, cy + 15 + runCycle, legW, legH);
                    ctx.fillRect(cx + 18, cy + 15 - runCycle, legW, legH);
                } else {
                    ctx.fillRect(cx - 18, cy + 15, legW, legH);
                    ctx.fillRect(cx - 5, cy + 15, legW, legH);
                    ctx.fillRect(cx + 5, cy + 12, legW, legH);
                    ctx.fillRect(cx + 18, cy + 10, legW, legH);
                }
                
                // Hooves
                ctx.fillStyle = '#5D4037';
                ctx.beginPath();
                ctx.ellipse(cx - 14.5, cy + 33 + (pony.isJumping ? 0 : runCycle), 4, 3, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(cx - 1.5, cy + 33 - (pony.isJumping ? 0 : runCycle), 4, 3, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(cx + 8.5, cy + 30 + (pony.isJumping ? 0 : runCycle), 4, 3, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(cx + 21.5, cy + 28 - (pony.isJumping ? 0 : runCycle), 4, 3, 0, 0, Math.PI * 2);
                ctx.fill();
            }
            
            ctx.restore();
        }

        function drawCoin(coin) {
            const shimmer = Math.sin(frameCount * 0.15 + coin.x * 0.1) * 0.2 + 0.8;
            
            ctx.save();
            ctx.shadowColor = '#FFD700';
            ctx.shadowBlur = 10;
            
            // Outer ring
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(coin.x + coin.size / 2, coin.y + coin.size / 2, coin.size / 2, 0, Math.PI * 2);
            ctx.fill();
            
            // Inner circle
            ctx.fillStyle = `rgba(255, 248, 150, ${shimmer})`;
            ctx.beginPath();
            ctx.arc(coin.x + coin.size / 2, coin.y + coin.size / 2, coin.size / 2.5, 0, Math.PI * 2);
            ctx.fill();
            
            // Shine
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.beginPath();
            ctx.arc(coin.x + coin.size * 0.35, coin.y + coin.size * 0.35, coin.size * 0.15, 0, Math.PI * 2);
            ctx.fill();
            
            // Dollar sign or star
            ctx.fillStyle = '#FFA000';
            ctx.font = `bold ${coin.size * 0.5}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('$', coin.x + coin.size / 2, coin.y + coin.size / 2);
            
            ctx.restore();
        }

        function drawObstacle(obstacle) {
            ctx.save();
            
            if (obstacle.type === 'cactus') {
                ctx.fillStyle = '#2E7D32';
                ctx.fillRect(obstacle.x + obstacle.width * 0.35, obstacle.y, obstacle.width * 0.3, obstacle.height);
                
                ctx.fillStyle = '#388E3C';
                ctx.fillRect(obstacle.x + obstacle.width * 0.35 + 2, obstacle.y + 2, obstacle.width * 0.3 - 4, obstacle.height - 4);
                
                ctx.fillStyle = '#2E7D32';
                ctx.fillRect(obstacle.x, obstacle.y + obstacle.height * 0.3, obstacle.width * 0.4, obstacle.height * 0.15);
                ctx.fillRect(obstacle.x + obstacle.width * 0.6, obstacle.y + obstacle.height * 0.5, obstacle.width * 0.4, obstacle.height * 0.15);
                
                ctx.fillStyle = '#4CAF50';
                ctx.beginPath();
                ctx.arc(obstacle.x + obstacle.width * 0.15, obstacle.y + obstacle.height * 0.3, 5, 0, Math.PI * 2);
                ctx.arc(obstacle.x + obstacle.width * 0.85, obstacle.y + obstacle.height * 0.5, 5, 0, Math.PI * 2);
                ctx.fill();
            } else if (obstacle.type === 'rock') {
                ctx.fillStyle = '#757575';
                ctx.beginPath();
                ctx.moveTo(obstacle.x + 5, obstacle.y + obstacle.height);
                ctx.lineTo(obstacle.x + obstacle.width * 0.3, obstacle.y + 5);
                ctx.lineTo(obstacle.x + obstacle.width * 0.7, obstacle.y);
                ctx.lineTo(obstacle.x + obstacle.width - 5, obstacle.y + obstacle.height * 0.4);
                ctx.lineTo(obstacle.x + obstacle.width, obstacle.y + obstacle.height);
                ctx.closePath();
                ctx.fill();
                
                ctx.fillStyle = '#9E9E9E';
                ctx.beginPath();
                ctx.arc(obstacle.x + obstacle.width * 0.4, obstacle.y + obstacle.height * 0.3, 6, 0, Math.PI * 2);
                ctx.fill();
            } else if (obstacle.type === 'bird') {
                const wingY = Math.sin(frameCount * 0.3) * 6;
                
                ctx.fillStyle = '#FFB300';
                ctx.beginPath();
                ctx.ellipse(obstacle.x + obstacle.width / 2, obstacle.y + obstacle.height / 2, obstacle.width / 2, obstacle.height / 2.5, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#FF8F00';
                ctx.beginPath();
                ctx.ellipse(obstacle.x + 2 + wingY, obstacle.y + obstacle.height * 0.35, 10, 5, -0.3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(obstacle.x + obstacle.width - 2 - wingY, obstacle.y + obstacle.height * 0.35, 10, 5, 0.3, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#FFF';
                ctx.beginPath();
                ctx.arc(obstacle.x + obstacle.width * 0.65, obstacle.y + obstacle.height * 0.4, 4, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#333';
                ctx.beginPath();
                ctx.arc(obstacle.x + obstacle.width * 0.67, obstacle.y + obstacle.height * 0.4, 2, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#FF5722';
                ctx.beginPath();
                ctx.moveTo(obstacle.x + obstacle.width * 0.8, obstacle.y + obstacle.height * 0.45);
                ctx.lineTo(obstacle.x + obstacle.width * 0.9, obstacle.y + obstacle.height * 0.42);
                ctx.lineTo(obstacle.x + obstacle.width * 0.8, obstacle.y + obstacle.height * 0.5);
                ctx.closePath();
                ctx.fill();
            }
            
            ctx.restore();
        }

        function drawParticles() {
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                ctx.fillStyle = `rgba(${p.r}, ${p.g}, ${p.b}, ${p.life})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.08;
                p.life -= 0.025;
                p.size *= 0.97;
            });
        }

        function createParticle(x, y, type) {
            const colors = {
                dust: { r: 139, g: 90, b: 43 },
                gold: { r: 255, g: 215, b: 0 },
                rainbow: { r: Math.floor(Math.random()*255), g: Math.floor(Math.random()*255), b: Math.floor(Math.random()*255) },
                coin: { r: 255, g: 223, b: 100 }
            };
            const color = colors[type] || colors.dust;
            
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 5 - 2,
                    size: Math.random() * 4 + 2,
                    life: 1,
                    r: color.r, g: color.g, b: color.b
                });
            }
        }

        function createObstacle() {
            const types = ['cactus', 'rock', 'bird'];
            const type = types[Math.floor(Math.random() * types.length)];
            let w, h, y;
            
            if (type === 'cactus') {
                w = 35 + Math.random() * 15;
                h = 50 + Math.random() * 35;
                y = ground.y - h;
            } else if (type === 'rock') {
                w = 40 + Math.random() * 20;
                h = 30 + Math.random() * 15;
                y = ground.y - h;
            } else {
                w = 32 + Math.random() * 12;
                h = 25 + Math.random() * 10;
                y = ground.y - h - Math.random() * 70 - 40;
            }
            
            obstacles.push({ x: canvas.width + 50, y, width: w, height: h, type });
        }

        function createCoin() {
            const size = 22;
            const y = ground.y - Math.random() * 120 - 30;
            coinsList.push({
                x: canvas.width + 50,
                y,
                size,
                collected: false
            });
        }

        function update() {
            // Handle crouching - adjust height
            if (pony.isCrouching && !pony.isJumping) {
                pony.height = pony.crouchHeight;
                pony.y = ground.y - pony.height;
            } else if (!pony.isCrouching) {
                pony.height = pony.normalHeight;
            }
            
            if (!pony.isCrouching || pony.isJumping) {
                pony.velocityY += GRAVITY;
                pony.y += pony.velocityY;
                
                if (pony.y >= ground.y - pony.height) {
                    pony.y = ground.y - pony.height;
                    pony.velocityY = 0;
                    pony.isJumping = false;
                }
            }
            
            obstacles = obstacles.filter(o => o.x > -100);
            obstacles.forEach(o => o.x -= gameSpeed);
            
            coinsList = coinsList.filter(c => c.x > -50 && !c.collected);
            coinsList.forEach(c => c.x -= gameSpeed);
            
            frameCount++;
        }

        function checkCollision() {
            const hitbox = { 
                x: pony.x + 8, 
                y: pony.y + (pony.isCrouching ? 5 : 8), 
                w: pony.width - 16, 
                h: pony.height - (pony.isCrouching ? 10 : 16)
            };
            
            for (const o of obstacles) {
                const oh = { x: o.x + 5, y: o.y + 5, w: o.width - 10, h: o.height - 10 };
                
                // Bird obstacle - can be avoided by crouching
                if (o.type === 'bird' && pony.isCrouching) {
                    continue;
                }
                
                if (hitbox.x < oh.x + oh.w && hitbox.x + hitbox.w > oh.x &&
                    hitbox.y < oh.y + oh.h && hitbox.y + hitbox.h > oh.y) {
                    return true;
                }
            }
            return false;
        }

        function checkCoinCollision() {
            const hitbox = { 
                x: pony.x + 8, 
                y: pony.y + 8, 
                w: pony.width - 16, 
                h: pony.height - 16
            };
            
            for (const coin of coinsList) {
                if (coin.collected) continue;
                
                const ch = { 
                    x: coin.x, 
                    y: coin.y, 
                    w: coin.size, 
                    h: coin.size 
                };
                
                if (hitbox.x < ch.x + ch.w && hitbox.x + hitbox.w > ch.x &&
                    hitbox.y < ch.y + ch.h && hitbox.y + hitbox.h > ch.y) {
                    coin.collected = true;
                    coins++;
                    score += 50;
                    coinsElement.textContent = coins;
                    createParticle(coin.x + coin.size / 2, coin.y + coin.size / 2, 'coin');
                }
            }
        }

        function jump() {
            if (!pony.isJumping && gameState === 'playing') {
                pony.velocityY = JUMP_FORCE;
                pony.isJumping = true;
                pony.isCrouching = false;
                createParticle(pony.x + pony.width / 2, pony.y + pony.height, 'dust');
            }
        }

        function crouch(active) {
            if (gameState === 'playing' && !pony.isJumping) {
                pony.isCrouching = active;
            }
        }

        function startGame() {
            gameState = 'playing';
            score = 0;
            coins = 0;
            gameSpeed = GAME_SPEED_INITIAL;
            obstacles = [];
            coinsList = [];
            particles = [];
            mountains = [];
            trees = [];
            clouds = [];
            
            pony.y = ground.y - pony.normalHeight;
            pony.height = pony.normalHeight;
            pony.velocityY = 0;
            pony.isJumping = false;
            pony.isCrouching = false;
            
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            scoreElement.textContent = score;
            coinsElement.textContent = coins;
            hint.innerHTML = '⬆️ 点击跳跃 | ⬇️ 向下滑动下蹲';
            
            for (let i = 0; i < 3; i++) {
                clouds.push({
                    x: Math.random() * canvas.width,
                    y: 30 + Math.random() * 60,
                    size: 25 + Math.random() * 20,
                    speed: 0.5 + Math.random() * 0.5
                });
            }
            
            gameLoop();
        }

        function gameOver() {
            gameState = 'gameover';
            
            const finalScore = Math.floor(score);
            if (finalScore > highScore) {
                highScore = finalScore;
                localStorage.setItem('ponyRunHighScore', highScore);
                highScoreElement.textContent = highScore;
                newHighScoreElement.textContent = highScore;
            }
            
            finalScoreElement.textContent = finalScore;
            gameOverScreen.classList.remove('hidden');
            hint.textContent = '点击屏幕重新开始';
            createParticle(pony.x + pony.width / 2, pony.y + pony.height / 2, 'gold');
        }

        let lastObstacleTime = 0;
        let lastCoinTime = 0;

        function gameLoop() {
            if (gameState !== 'playing') return;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawSky();
            drawSun();
            drawMountains();
            drawClouds();
            drawTrees();
            drawGround();
            
            coinsList.forEach(drawCoin);
            
            drawPony();
            obstacles.forEach(drawObstacle);
            drawParticles();
            
            update();
            
            const now = Date.now();
            if (now - lastObstacleTime > 1600 / (gameSpeed / GAME_SPEED_INITIAL)) {
                createObstacle();
                lastObstacleTime = now;
            }
            
            if (now - lastCoinTime > 2000) {
                createCoin();
                lastCoinTime = now;
            }
            
            score += 0.12;
            scoreElement.textContent = Math.floor(score);
            
            checkCoinCollision();
            
            if (Math.floor(score) % 500 === 0 && Math.floor(score) > 0) {
                gameSpeed += 0.5;
                createParticle(pony.x + pony.width / 2, pony.y, 'rainbow');
            }
            
            if (checkCollision()) {
                gameOver();
                return;
            }
            
            requestAnimationFrame(gameLoop);
        }

        // Input handlers
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                e.preventDefault();
                if (gameState === 'start' || gameState === 'gameover') {
                    startGame();
                } else {
                    jump();
                }
            } else if (e.code === 'ArrowDown') {
                e.preventDefault();
                if (gameState === 'playing') {
                    crouch(true);
                }
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowDown') {
                crouch(false);
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            touchStartY = e.touches[0].clientY;
            touchStartTime = Date.now();
            
            if (gameState === 'start' || gameState === 'gameover') {
                startGame();
            }
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (gameState !== 'playing') return;
            
            const touchY = e.touches[0].clientY;
            const deltaY = touchY - touchStartY;
            
            if (deltaY > 30) {
                crouch(true);
            }
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            const touchDuration = Date.now() - touchStartTime;
            const touchEndY = e.changedTouches[0].clientY;
            const deltaY = touchEndY - touchStartY;
            
            if (gameState === 'playing') {
                if (deltaY > 30) {
                    // Swiped down - was crouching
                    crouch(false);
                } else if (Math.abs(deltaY) < 20 && touchDuration < 300) {
                    // Quick tap - jump
                    jump();
                }
            }
        }, { passive: false });

        canvas.addEventListener('click', (e) => {
            if (gameState === 'playing') {
                jump();
            }
        });

        startBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            startGame();
        });
        
        restartBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            startGame();
        });

        window.addEventListener('resize', resizeCanvas);
        
        // Prevent scrolling on mobile
        document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
        document.body.addEventListener('gesturestart', (e) => e.preventDefault());
        
        resizeCanvas();
    </script>
</body>
</html>
