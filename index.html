<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>小马快跑</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            overflow: hidden;
            background: #87CEEB;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: manipulation;
        }
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas { display: block; max-width: 100%; max-height: 100%; }
        #ui {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            z-index: 10;
            pointer-events: none;
        }
        .score-box {
            background: rgba(255,255,255,0.85);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.55);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            backdrop-filter: blur(5px);
        }
        .hidden { display: none !important; }
        h1 {
            font-size: 44px;
            color: #FF69B4;
            text-shadow: 3px 3px 0 #FFF, -1px -1px 0 #FFF, 1px -1px 0 #FFF, -1px 1px 0 #FFF;
            margin-bottom: 15px;
            animation: bounce 1s infinite;
        }
        h2 { font-size: 34px; color: #FFF; margin-bottom: 10px; }
        .btn {
            padding: 14px 36px;
            font-size: 22px;
            background: linear-gradient(135deg, #FF69B4, #FF8C00);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 18px;
            box-shadow: 0 5px 15px rgba(255,105,180,0.4);
            transition: transform 0.15s;
        }
        .btn:active { transform: scale(0.95); }
        .tips { color: #FFF; font-size: 15px; margin-top: 25px; text-align: center; line-height: 2; }
        @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="ui">
            <div class="score-box">金币: <span id="score">0</span></div>
        </div>
        <div id="startScreen">
            <h1>🐴 小马快跑 🐴</h1>
            <button class="btn" id="startBtn">开始游戏</button>
            <div class="tips">
                <p>⬆️ 点击/空格 跳跃 · 可二段跳</p>
                <p>⬇️ 按住↓/下滑 蹲下躲小鸟</p>
                <p>💰 金币2分 · 🟢 绿色金币5分</p>
            </div>
        </div>
        <div id="gameOverScreen" class="hidden">
            <h2>游戏结束</h2>
            <p style="color:#FFD700;font-size:24px;">金币: <span id="finalScore">0</span></p>
            <p style="color:#FFF;font-size:18px;">最多金币: <span id="highScore">0</span></p>
            <button class="btn" id="restartBtn">再来一次</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const startScreen = document.getElementById('startScreen');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const finalScoreElement = document.getElementById('finalScore');
    const highScoreElement = document.getElementById('highScore');

    let W, H;
    let gameState = 'start';
    let score = 0;
    let highScore = parseInt(localStorage.getItem('ponyRunHighScore')) || 0;
    highScoreElement.textContent = highScore;

    // 物理参数
    const GRAVITY = 0.45;
    const JUMP_FORCE = -9;
    const SPEED_START = 2.5;
    const SPEED_MAX = 7;

    let gameSpeed, frameCount, lastObstTime, lastCoinTime;
    const ground = { y: 0 };

    // 小马
    const pony = {
        x: 80, y: 0, width: 50, height: 60,
        vy: 0, isJumping: false, jumpCount: 0,
        isCrouching: false, normalH: 60, crouchH: 35
    };

    let obstacles = [], coins = [], particles = [], clouds = [];

    // 音效
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        const t = audioCtx.currentTime;
        switch(type) {
            case 'jump':
                o.type='sine'; o.frequency.setValueAtTime(300,t); o.frequency.exponentialRampToValueAtTime(600,t+0.15);
                g.gain.setValueAtTime(0.25,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.15);
                o.start(t); o.stop(t+0.15); break;
            case 'doubleJump':
                o.type='sine'; o.frequency.setValueAtTime(400,t); o.frequency.exponentialRampToValueAtTime(850,t+0.12);
                g.gain.setValueAtTime(0.25,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.12);
                o.start(t); o.stop(t+0.12); break;
            case 'coin':
                o.type='sine'; o.frequency.setValueAtTime(500,t); o.frequency.setValueAtTime(700,t+0.05); o.frequency.setValueAtTime(900,t+0.1);
                g.gain.setValueAtTime(0.25,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.15);
                o.start(t); o.stop(t+0.15); break;
            case 'gameOver':
                o.type='triangle'; o.frequency.setValueAtTime(300,t); o.frequency.setValueAtTime(200,t+0.2); o.frequency.setValueAtTime(100,t+0.4);
                g.gain.setValueAtTime(0.3,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.5);
                o.start(t); o.stop(t+0.5); break;
            case 'start':
                o.type='sine'; o.frequency.setValueAtTime(440,t); o.frequency.setValueAtTime(554,t+0.1); o.frequency.setValueAtTime(659,t+0.2);
                g.gain.setValueAtTime(0.2,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.3);
                o.start(t); o.stop(t+0.3); break;
        }
    }

    function resize() {
        W = window.innerWidth; H = window.innerHeight;
        canvas.width = W; canvas.height = H;
        ground.y = H * 0.75;
        pony.y = ground.y - pony.height;
        initClouds();
    }

    function initClouds() {
        clouds = [];
        for (let i = 0; i < 5; i++) {
            clouds.push({ x: Math.random()*W, y: Math.random()*(ground.y*0.45), w: 70+Math.random()*60, spd: 0.3+Math.random()*0.5 });
        }
    }

    // ===== 绘制 =====
    function drawBg() {
        // 天空
        const sky = ctx.createLinearGradient(0,0,0,ground.y);
        sky.addColorStop(0,'#87CEEB'); sky.addColorStop(0.5,'#B0E0E6'); sky.addColorStop(1,'#98FB98');
        ctx.fillStyle = sky; ctx.fillRect(0,0,W,ground.y);
        // 太阳
        ctx.fillStyle='#FFD700'; ctx.beginPath(); ctx.arc(W-80,55,30,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='rgba(255,215,0,0.25)'; ctx.beginPath(); ctx.arc(W-80,55,48,0,Math.PI*2); ctx.fill();
        // 云
        clouds.forEach(c => {
            ctx.fillStyle='rgba(255,255,255,0.85)';
            ctx.beginPath();
            ctx.arc(c.x,c.y,c.w/2,0,Math.PI*2);
            ctx.arc(c.x+c.w*0.4,c.y-4,c.w/3,0,Math.PI*2);
            ctx.arc(c.x+c.w*0.7,c.y,c.w/2.5,0,Math.PI*2);
            ctx.fill();
        });
        // 地面
        ctx.fillStyle='#567D46'; ctx.fillRect(0,ground.y,W,H-ground.y);
        ctx.fillStyle='#8B4513'; ctx.fillRect(0,ground.y+8,W,12);
        // 草
        for(let i=0;i<W;i+=30){ ctx.fillStyle='#228B22'; ctx.beginPath(); ctx.moveTo(i+10,ground.y); ctx.lineTo(i+15,ground.y-10); ctx.lineTo(i+20,ground.y); ctx.closePath(); ctx.fill(); }
        for(let i=0;i<W;i+=80){ ctx.fillStyle='#4A7C23'; ctx.beginPath(); ctx.moveTo(i+20,ground.y); ctx.lineTo(i+35,ground.y-18); ctx.lineTo(i+50,ground.y); ctx.closePath(); ctx.fill(); }
    }

    function drawPony() {
        ctx.save();
        ctx.translate(pony.x+pony.width/2, pony.y+pony.height/2);
        if(pony.isJumping && !pony.isCrouching) ctx.rotate(-0.15);
        if(pony.isCrouching) ctx.scale(1.2,0.75);

        const px=-pony.width/2, py=-pony.height/2;
        // 身体
        ctx.fillStyle='#FFB6C1'; ctx.beginPath(); ctx.ellipse(px+pony.width*0.5,py+pony.height*0.6,pony.width*0.35,pony.height*0.25,0,0,Math.PI*2); ctx.fill();
        // 头
        ctx.fillStyle='#FF69B4'; ctx.beginPath(); ctx.ellipse(px+pony.width*0.5,py+pony.height*0.35,pony.width*0.3,pony.height*0.3,0,0,Math.PI*2); ctx.fill();
        // 鬃毛
        ctx.fillStyle='#FFD700';
        ctx.beginPath(); ctx.moveTo(px+pony.width*0.35,py+pony.height*0.15); ctx.bezierCurveTo(px+pony.width*0.4,py-pony.height*0.1,px+pony.width*0.55,py-pony.height*0.1,px+pony.width*0.6,py+pony.height*0.1); ctx.fill();
        ctx.beginPath(); ctx.moveTo(px+pony.width*0.25,py+pony.height*0.25); ctx.bezierCurveTo(px+pony.width*0.2,py+pony.height*0.05,px+pony.width*0.35,py+pony.height*0.05,px+pony.width*0.35,py+pony.height*0.2); ctx.fill();
        ctx.beginPath(); ctx.moveTo(px+pony.width*0.75,py+pony.height*0.25); ctx.bezierCurveTo(px+pony.width*0.8,py+pony.height*0.05,px+pony.width*0.65,py+pony.height*0.05,px+pony.width*0.65,py+pony.height*0.2); ctx.fill();
        // 眼睛
        ctx.fillStyle='#FFF'; ctx.beginPath(); ctx.arc(px+pony.width*0.65,py+pony.height*0.3,pony.width*0.12,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(px+pony.width*0.68,py+pony.height*0.3,pony.width*0.06,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#FFF'; ctx.beginPath(); ctx.arc(px+pony.width*0.7,py+pony.height*0.28,pony.width*0.025,0,Math.PI*2); ctx.fill();
        // 腮红
        ctx.fillStyle='#FFB6C1'; ctx.beginPath(); ctx.arc(px+pony.width*0.75,py+pony.height*0.4,pony.width*0.04,0,Math.PI*2); ctx.fill();
        // 鼻子
        ctx.fillStyle='#FFC0CB'; ctx.beginPath(); ctx.ellipse(px+pony.width*0.55,py+pony.height*0.45,pony.width*0.08,pony.width*0.04,0,0,Math.PI*2); ctx.fill();
        // 耳朵
        ctx.fillStyle='#FFB6C1';
        ctx.beginPath(); ctx.ellipse(px+pony.width*0.25,py+pony.height*0.5,pony.width*0.06,pony.width*0.04,-0.3,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(px+pony.width*0.75,py+pony.height*0.5,pony.width*0.06,pony.width*0.04,0.3,0,Math.PI*2); ctx.fill();
        // 蹄子
        ctx.fillStyle='#FFD700';
        ctx.beginPath(); ctx.ellipse(px+pony.width*0.35,py+pony.height*0.85,pony.width*0.05,pony.width*0.04,0,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(px+pony.width*0.65,py+pony.height*0.85,pony.width*0.05,pony.width*0.04,0,0,Math.PI*2); ctx.fill();

        ctx.restore();
    }

    // 绘制小鸟
    function drawBird(bx, by, bw, bh) {
        ctx.fillStyle='#FFD700';
        ctx.beginPath(); ctx.ellipse(bx+bw*0.5,by+bh*0.5,bw*0.35,bh*0.4,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#FFEC8B';
        ctx.beginPath(); ctx.ellipse(bx+bw*0.5,by+bh*0.35,bw*0.25,bh*0.25,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#000';
        ctx.beginPath(); ctx.arc(bx+bw*0.65,by+bh*0.45,bw*0.06,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#FFA500';
        const wa = Math.sin(Date.now()/150)*0.3;
        ctx.save(); ctx.translate(bx+bw*0.3,by+bh*0.5); ctx.rotate(wa);
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-bw*0.25,-bh*0.3); ctx.lineTo(-bw*0.15,0); ctx.closePath(); ctx.fill();
        ctx.restore();
        ctx.save(); ctx.translate(bx+bw*0.3,by+bh*0.5); ctx.rotate(-wa);
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-bw*0.25,bh*0.3); ctx.lineTo(-bw*0.15,0); ctx.closePath(); ctx.fill();
        ctx.restore();
    }

    function drawObstacle(o) {
        ctx.save();
        switch(o.type) {
            case 'smallRock':
                ctx.fillStyle='#8B7355'; ctx.beginPath();
                ctx.moveTo(o.x,o.y+o.height); ctx.lineTo(o.x+o.width*0.2,o.y+o.height*0.3); ctx.lineTo(o.x+o.width*0.6,o.y); ctx.lineTo(o.x+o.width*0.9,o.y+o.height*0.4); ctx.lineTo(o.x+o.width,o.y+o.height); ctx.closePath(); ctx.fill();
                ctx.fillStyle='#A0826D'; ctx.beginPath();
                ctx.moveTo(o.x+o.width*0.3,o.y+o.height*0.5); ctx.lineTo(o.x+o.width*0.5,o.y+o.height*0.15); ctx.lineTo(o.x+o.width*0.7,o.y+o.height*0.4); ctx.closePath(); ctx.fill();
                break;
            case 'bigRock':
                ctx.fillStyle='#6B5344'; ctx.beginPath();
                ctx.moveTo(o.x,o.y+o.height); ctx.lineTo(o.x+o.width*0.15,o.y+o.height*0.2); ctx.lineTo(o.x+o.width*0.5,o.y); ctx.lineTo(o.x+o.width*0.85,o.y+o.height*0.25); ctx.lineTo(o.x+o.width,o.y+o.height); ctx.closePath(); ctx.fill();
                ctx.fillStyle='#8B7355'; ctx.beginPath();
                ctx.moveTo(o.x+o.width*0.25,o.y+o.height*0.4); ctx.lineTo(o.x+o.width*0.45,o.y+o.height*0.05); ctx.lineTo(o.x+o.width*0.65,o.y+o.height*0.3); ctx.closePath(); ctx.fill();
                break;
            case 'smallCactus':
                ctx.fillStyle='#228B22'; ctx.beginPath();
                ctx.moveTo(o.x+o.width*0.5,o.y); ctx.lineTo(o.x+o.width*0.6,o.y+o.height*0.4); ctx.lineTo(o.x+o.width,o.y+o.height); ctx.lineTo(o.x,o.y+o.height); ctx.lineTo(o.x+o.width*0.4,o.y+o.height*0.4); ctx.closePath(); ctx.fill();
                ctx.fillStyle='#32CD32'; ctx.beginPath();
                ctx.moveTo(o.x+o.width*0.5,o.y+o.height*0.15); ctx.lineTo(o.x+o.width*0.55,o.y+o.height*0.4); ctx.lineTo(o.x+o.width*0.45,o.y+o.height*0.4); ctx.closePath(); ctx.fill();
                break;
            case 'bigCactus':
                ctx.fillStyle='#006400'; ctx.beginPath();
                ctx.moveTo(o.x+o.width*0.5,o.y); ctx.lineTo(o.x+o.width*0.65,o.y+o.height*0.35); ctx.lineTo(o.x+o.width,o.y+o.height); ctx.lineTo(o.x,o.y+o.height); ctx.lineTo(o.x+o.width*0.35,o.y+o.height*0.35); ctx.closePath(); ctx.fill();
                ctx.fillStyle='#228B22'; ctx.beginPath();
                ctx.moveTo(o.x+o.width*0.5,o.y+o.height*0.1); ctx.lineTo(o.x+o.width*0.6,o.y+o.height*0.35); ctx.lineTo(o.x+o.width*0.4,o.y+o.height*0.35); ctx.closePath(); ctx.fill();
                ctx.fillStyle='#FF4500';
                ctx.beginPath(); ctx.moveTo(o.x+o.width*0.3,o.y+o.height*0.4); ctx.lineTo(o.x+o.width*0.35,o.y+o.height*0.3); ctx.lineTo(o.x+o.width*0.25,o.y+o.height*0.35); ctx.closePath(); ctx.fill();
                ctx.beginPath(); ctx.moveTo(o.x+o.width*0.7,o.y+o.height*0.5); ctx.lineTo(o.x+o.width*0.75,o.y+o.height*0.4); ctx.lineTo(o.x+o.width*0.65,o.y+o.height*0.45); ctx.closePath(); ctx.fill();
                break;
            case 'bird':
            case 'lowBirdWithCoin':
                drawBird(o.x, o.y, o.width, o.height);
                break;
            case 'comboRock':
                // 小石头
                ctx.fillStyle='#8B7355'; ctx.beginPath();
                ctx.moveTo(o.x,o.y+o.height); ctx.lineTo(o.x+o.width*0.2,o.y+o.height*0.3); ctx.lineTo(o.x+o.width*0.6,o.y); ctx.lineTo(o.x+o.width*0.9,o.y+o.height*0.4); ctx.lineTo(o.x+o.width,o.y+o.height); ctx.closePath(); ctx.fill();
                ctx.fillStyle='#A0826D'; ctx.beginPath();
                ctx.moveTo(o.x+o.width*0.3,o.y+o.height*0.5); ctx.lineTo(o.x+o.width*0.5,o.y+o.height*0.15); ctx.lineTo(o.x+o.width*0.7,o.y+o.height*0.4); ctx.closePath(); ctx.fill();
                // 上方小鸟
                if(o.birdY) drawBird(o.x+o.width/2-17, o.birdY, 35, 18);
                break;
            case 'comboCactus':
                // 小仙人掌
                ctx.fillStyle='#228B22'; ctx.beginPath();
                ctx.moveTo(o.x+o.width*0.5,o.y); ctx.lineTo(o.x+o.width*0.6,o.y+o.height*0.4); ctx.lineTo(o.x+o.width,o.y+o.height); ctx.lineTo(o.x,o.y+o.height); ctx.lineTo(o.x+o.width*0.4,o.y+o.height*0.4); ctx.closePath(); ctx.fill();
                ctx.fillStyle='#32CD32'; ctx.beginPath();
                ctx.moveTo(o.x+o.width*0.5,o.y+o.height*0.15); ctx.lineTo(o.x+o.width*0.55,o.y+o.height*0.4); ctx.lineTo(o.x+o.width*0.45,o.y+o.height*0.4); ctx.closePath(); ctx.fill();
                // 上方小鸟
                if(o.birdY) drawBird(o.x+o.width/2-17, o.birdY, 35, 18);
                break;
        }
        ctx.restore();
    }

    function drawCoin(c) {
        if(c.collected) return;
        const bounce = Math.sin(Date.now()/200)*3;
        ctx.save(); ctx.translate(c.x, c.y+bounce);
        ctx.beginPath(); ctx.arc(0,0,c.radius,0,Math.PI*2);
        if(c.ctype==='green'){
            const g=ctx.createRadialGradient(-3,-3,0,0,0,c.radius);
            g.addColorStop(0,'#00FF00'); g.addColorStop(0.5,'#32CD32'); g.addColorStop(1,'#228B22');
            ctx.fillStyle=g; ctx.fill(); ctx.strokeStyle='#00FF00'; ctx.lineWidth=2; ctx.stroke();
            ctx.fillStyle='#FFF'; ctx.font='bold 13px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('G',0,0);
        } else {
            const g=ctx.createRadialGradient(-3,-3,0,0,0,c.radius);
            g.addColorStop(0,'#FFD700'); g.addColorStop(0.5,'#FFA500'); g.addColorStop(1,'#CD853F');
            ctx.fillStyle=g; ctx.fill(); ctx.strokeStyle='#FFD700'; ctx.lineWidth=2; ctx.stroke();
            ctx.fillStyle='#FFF'; ctx.font='bold 13px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('$',0,0);
        }
        ctx.restore();
    }

    function drawParticles() {
        particles = particles.filter(p=>p.life>0);
        particles.forEach(p=>{
            ctx.fillStyle=`rgba(${p.r},${p.g},${p.b},${p.life})`;
            ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
            p.x+=p.vx; p.y+=p.vy; p.vy+=0.08; p.life-=0.025; p.size*=0.97;
        });
    }

    function addParticle(x,y,type) {
        const colors={dust:{r:194,g:178,b:128},rainbow:{r:255,g:105,b:180},coin:{r:255,g:223,b:100},green:{r:50,g:205,b:50}};
        const c=colors[type]||colors.dust;
        for(let i=0;i<8;i++) particles.push({x,y,vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*4-2,size:Math.random()*3+2,life:1,r:c.r,g:c.g,b:c.b});
    }

    // ===== 生成 =====
    function createObstacle() {
        // 障碍类型：小石头、大石头、小仙人掌、大仙人掌、低空小鸟、低空小鸟+金币、小石头+高空鸟、小仙人掌+高空鸟
        const types = ['smallRock','bigRock','smallCactus','bigCactus','bird','lowBirdWithCoin','comboRock','comboCactus'];
        const type = types[Math.floor(Math.random()*types.length)];
        let w, h, y, birdY;

        if(type==='smallRock'){
            w=30+Math.random()*10; h=20+Math.random()*14; y=ground.y-h;
        } else if(type==='bigRock'){
            w=25+Math.random()*10; h=54; y=ground.y-h;
        } else if(type==='smallCactus'){
            w=22+Math.random()*8; h=22+Math.random()*12; y=ground.y-h;
        } else if(type==='bigCactus'){
            w=22+Math.random()*8; h=54; y=ground.y-h;
        } else if(type==='bird'){
            // 低空小鸟，需要蹲下躲避
            w=30+Math.random()*10; h=18+Math.random()*5; y=ground.y-40-Math.random()*10;
        } else if(type==='lowBirdWithCoin'){
            // 低空小鸟+下方金币，蹲下收集金币
            w=30+Math.random()*10; h=18+Math.random()*5; y=ground.y-40-Math.random()*10;
        } else if(type==='comboRock'){
            // 小石头+高空鸟，一段跳从中间穿过
            w=30+Math.random()*10; h=20+Math.random()*14; y=ground.y-h; birdY=ground.y-170;
        } else if(type==='comboCactus'){
            // 小仙人掌+高空鸟，一段跳从中间穿过
            w=22+Math.random()*8; h=22+Math.random()*12; y=ground.y-h; birdY=ground.y-170;
        }

        obstacles.push({x:W+50,y,width:w,height:h,type,birdY});

        // 低空小鸟+金币：在小鸟下方地面放金币
        if(type==='lowBirdWithCoin'){
            const ctype = Math.random()<0.25?'green':'gold';
            coins.push({x:W+50+w/2, y:ground.y-20, radius:12, collected:false, ctype});
        }
    }

    function createCoin() {
        // 三层高度：地面、一段跳、二段跳
        const yOpts = [
            ground.y-25,                       // 地面（站着就能收集）
            ground.y-70-Math.random()*20,      // 一段跳高度
            ground.y-130-Math.random()*20      // 二段跳高度
        ];
        const y = yOpts[Math.floor(Math.random()*yOpts.length)];
        const ctype = Math.random()<0.25?'green':'gold';

        // 检查是否与障碍物重叠
        let ok = true;
        for(const o of obstacles){
            const cx=W+30, cr=15, ct=y-12, cb=y+12;
            if(cx+cr>o.x-30 && cx-cr<o.x+o.width+30){
                if(cb>o.y && ct<o.y+o.height){ ok=false; break; }
                if(o.birdY && cb>o.birdY && ct<o.birdY+18){ ok=false; break; }
            }
        }
        if(ok) coins.push({x:W+30,y,radius:12,collected:false,ctype});
    }

    // ===== 更新 =====
    function update() {
        const prevH = pony.height;
        pony.height = pony.isCrouching ? pony.crouchH : pony.normalH;
        if(!pony.isJumping && prevH!==pony.height) pony.y = ground.y - pony.height;
        if(pony.isCrouching && !pony.isJumping) pony.y = ground.y - pony.height;

        if(pony.isJumping){
            const gm = pony.isCrouching ? 2.5 : 1;
            pony.vy += GRAVITY*gm;
            pony.y += pony.vy;
            if(pony.y >= ground.y-pony.height){
                pony.y=ground.y-pony.height; pony.vy=0; pony.isJumping=false; pony.jumpCount=0;
            }
        }

        obstacles = obstacles.filter(o=>o.x>-100);
        obstacles.forEach(o=>o.x-=gameSpeed);
        coins = coins.filter(c=>c.x>-50&&!c.collected);
        coins.forEach(c=>c.x-=gameSpeed);
        clouds.forEach(c=>{c.x-=c.spd; if(c.x<-c.w){c.x=W+c.w;c.y=Math.random()*(ground.y*0.45);}});

        frameCount++;
        scoreElement.textContent = score;

        if(frameCount%500===0) gameSpeed=Math.min(gameSpeed+0.2,SPEED_MAX);

        const now = Date.now();
        const intv = 2500-((gameSpeed-SPEED_START)/(SPEED_MAX-SPEED_START))*1300;
        if(now-lastObstTime>intv){ createObstacle(); lastObstTime=now; }
        if(now-lastCoinTime>800){ createCoin(); lastCoinTime=now; }
    }

    // ===== 碰撞 =====
    function checkCollision() {
        const hb = { x:pony.x+5, y:pony.y+5, w:pony.width-10, h:pony.height-10 };

        for(const o of obstacles){
            // 低空小鸟蹲下可躲
            if((o.type==='bird'||o.type==='lowBirdWithCoin') && pony.isCrouching) continue;

            // 主碰撞体
            if(hb.x<o.x+o.width && hb.x+hb.w>o.x && hb.y<o.y+o.height && hb.y+hb.h>o.y) return true;

            // 组合障碍的小鸟碰撞
            if((o.type==='comboRock'||o.type==='comboCactus') && o.birdY){
                const bx=o.x+o.width/2-17, by=o.birdY, bw=35, bh=18;
                if(hb.x<bx+bw && hb.x+hb.w>bx && hb.y<by+bh && hb.y+hb.h>by) return true;
            }
        }

        // 金币收集
        for(const c of coins){
            if(c.collected) continue;
            const dx=(pony.x+pony.width/2)-c.x, dy=(pony.y+pony.height/2)-c.y;
            if(Math.sqrt(dx*dx+dy*dy)<c.radius+pony.width/2){
                c.collected=true;
                score += c.ctype==='green'?5:2;
                playSound('coin');
                addParticle(c.x,c.y,c.ctype==='green'?'green':'coin');
            }
        }
        return false;
    }

    // ===== 游戏控制 =====
    function startGame(){
        gameState='playing'; score=0; gameSpeed=SPEED_START; frameCount=0;
        obstacles=[]; coins=[]; particles=[];
        pony.y=ground.y-pony.height; pony.isJumping=false; pony.jumpCount=0;
        pony.isCrouching=false; pony.height=pony.normalH;
        scoreElement.textContent=score;
        startScreen.classList.add('hidden'); gameOverScreen.classList.add('hidden');
        lastObstTime=Date.now(); lastCoinTime=Date.now();
        playSound('start');
    }

    function gameOver(){
        gameState='gameOver'; playSound('gameOver');
        if(score>highScore){highScore=score;localStorage.setItem('ponyRunHighScore',highScore);}
        finalScoreElement.textContent=score; highScoreElement.textContent=highScore;
        gameOverScreen.classList.remove('hidden');
    }

    function jump(){
        if(gameState!=='playing') return;
        if(!pony.isJumping && !pony.isCrouching){
            pony.vy=JUMP_FORCE; pony.isJumping=true; pony.jumpCount=1;
            playSound('jump'); addParticle(pony.x+pony.width/2,pony.y+pony.height,'dust');
        } else if(pony.isJumping && pony.jumpCount<2){
            pony.vy=JUMP_FORCE*0.85; pony.jumpCount=2;
            playSound('doubleJump'); addParticle(pony.x+pony.width/2,pony.y+pony.height/2,'rainbow');
        }
    }

    function crouch(on){
        if(gameState!=='playing') return;
        if(on && !pony.isJumping) pony.isCrouching=true;
        else if(!on) pony.isCrouching=false;
    }

    // ===== 主循环 =====
    function loop(){
        ctx.clearRect(0,0,W,H);
        drawBg();
        if(gameState==='playing'){ update(); if(checkCollision()) gameOver(); }
        obstacles.forEach(drawObstacle);
        coins.forEach(drawCoin);
        drawPony();
        drawParticles();
        requestAnimationFrame(loop);
    }

    // ===== 输入 =====
    document.getElementById('startBtn').addEventListener('click',startGame);
    document.getElementById('restartBtn').addEventListener('click',startGame);

    document.addEventListener('keydown',e=>{
        if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();gameState!=='playing'?startGame():jump();}
        if(e.code==='ArrowDown'){e.preventDefault();crouch(true);}
    });
    document.addEventListener('keyup',e=>{if(e.code==='ArrowDown')crouch(false);});

    let touchY=0, touching=false;
    canvas.addEventListener('touchstart',e=>{
        e.preventDefault(); touchY=e.touches[0].clientY; touching=true;
        if(gameState!=='playing') startGame();
    },{passive:false});
    canvas.addEventListener('touchmove',e=>{
        e.preventDefault(); if(!touching) return;
        crouch(e.touches[0].clientY-touchY>30);
    },{passive:false});
    canvas.addEventListener('touchend',e=>{
        e.preventDefault(); touching=false; crouch(false);
        if(gameState==='playing') jump();
    },{passive:false});
    canvas.addEventListener('mousedown',()=>{gameState!=='playing'?startGame():jump();});

    window.addEventListener('resize',resize);
    resize(); loop();
    </script>
</body>
